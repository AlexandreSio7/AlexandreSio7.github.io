<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me contacter - Alexandre Barrey</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
        <div class="logo">Alexandre B.</div>
        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="index.html#projets">Projets (E6)</a></li>
            <li><a href="veille.html">Veille Tech</a></li>
            <li><a href="cv-ambitions.html">CV & Ambitions</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <section class="section" style="margin-top: 80px;">
        <h1 class="section-title">Envoyez-moi un message</h1>
        
        <div class="card" style="max-width: 700px; margin: 0 auto;">
            <p style="text-align: center; margin-bottom: 20px;">Vous avez une question ou une opportunité d'alternance pour ma Licence à l'UTEC ? N'hésitez pas à m'écrire !</p>
            
            <form class="contact-form" action="https://formspree.io/f/mgonopal" method="POST">
                
                <label for="nom">Votre Nom / Entreprise :</label>
                <input type="text" id="nom" name="nom" required placeholder="Ex: Jean Dupont">
                
                <label for="email">Votre Email :</label>
                <input type="email" id="email" name="email" required placeholder="Ex: jean.dupont@email.com">
                
                <label for="message">Votre Message :</label>
                <textarea id="message" name="message" required placeholder="Bonjour Alexandre..."></textarea>
                
                <button type="submit" class="btn" style="border: none; cursor: pointer; font-size: 1.1rem; margin-top: 10px;">Envoyer le message</button>
            </form>
        </div>
    </section>

</body>
</html>
