<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Alexandre Barrey</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">Alexandre B.</div>
        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="index.html#projets">Projets</a></li>
            <li><a href="veille.html">Veille Tech</a></li>
            <li><a href="cv-ambitions.html">CV & Ambitions</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <section class="section" style="margin-top: 100px;">
        <h1 class="section-title">Me contacter</h1>
        <p style="text-align: center; margin-bottom: 40px; color: #94a3b8;">
            Une question ou une opportunité ? Écrivez-moi directement ici.
        </p>
        
        <form id="my-form" action="https://formspree.io/f/mgonopal" method="POST" class="contact-form">
            <label>Nom complet</label>
            <input type="text" name="name" placeholder="Votre nom" required>

            <label>Adresse E-mail</label>
            <input type="email" name="email" placeholder="votre@email.com" required>

            <label>Message</label>
            <textarea name="message" placeholder="Votre message..." required></textarea>

            <button id="my-form-button" class="btn" style="width: 100%; margin-top: 10px; cursor: pointer;">Envoyer le message</button>
            
            <p id="my-form-status" style="margin-top: 20px; text-align: center; font-weight: bold;"></p>
        </form>
    </section>

    <footer>
        <p class="copyright">© 2026 - Alexandre Barrey - Portfolio BTS SIO</p>
    </footer>

    <script>
        var form = document.getElementById("my-form");
        
        async function handleSubmit(event) {
          event.preventDefault(); // Empêche l'ouverture de la page Formspree
          var status = document.getElementById("my-form-status");
          var btn = document.getElementById("my-form-button");
          var data = new FormData(event.target);
          
          btn.innerHTML = "Envoi en cours...";
          btn.disabled = true;

          fetch(event.target.action, {
            method: form.method,
            body: data,
            headers: {
                'Accept': 'application/json'
            }
          }).then(response => {
            if (response.ok) {
              status.innerHTML = "✅ Merci ! Votre message a été envoyé avec succès.";
              status.style.color = "#00a8ff";
              form.reset(); // Vide le formulaire
            } else {
              status.innerHTML = "❌ Erreur lors de l'envoi. Veuillez réessayer.";
              status.style.color = "#ff4444";
            }
            btn.innerHTML = "Envoyer le message";
            btn.disabled = false;
          }).catch(error => {
            status.innerHTML = "❌ Erreur réseau. Vérifiez votre connexion.";
            status.style.color = "#ff4444";
            btn.innerHTML = "Envoyer le message";
            btn.disabled = false;
          });
        }
        form.addEventListener("submit", handleSubmit)
    </script>

</body>
</html>
